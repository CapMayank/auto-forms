version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/tracker.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  watcher:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/tracker.db
      - GOOGLE_APPLICATION_CREDENTIALS=/app/service_account.json
    command: python watcher.py

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
